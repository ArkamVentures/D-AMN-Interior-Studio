<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Damn Aluminium Fabrication | Industrial Aluminium Experts</title>
    <meta name="description" content="Damn Aluminium Fabrication offers aluminium fabrication, custom designs, and industrial solutions with premium craftsmanship and responsive service." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body class="bg-warm-gray text-primary dark:bg-dark-bg dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; z-index:999999; top:0; left:0; padding:20px; font-family:monospace; border:2px solid red; font-size:16px;"><h1>Runtime Error</h1><p>' + message + '</p><pre>' + (error && error.stack ? error.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; z-index:999999; top:0; left:0; padding:20px; font-family:monospace; border:2px solid red; font-size:16px;"><h1>Unhandled Promise Rejection</h1><p>' + event.reason + '</p><pre>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
